<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripStore — Quote Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --navy:#1a3c5e; --blue:#2563eb; --light-blue:#eff6ff;
    --green:#16a34a; --green-bg:#d4edda; --green-light:#f0fdf4;
    --amber:#d97706; --amber-bg:#fff3cd;
    --red:#dc2626;   --red-bg:#f8d7da;
    --grey:#64748b;  --border:#e2e8f0; --bg:#f8fafc;
    --text:#1e293b;  --text2:#475569;
  }
  body { font-family:Arial,sans-serif; background:var(--bg); color:var(--text); font-size:13px; }

  /* ── HEADER ── */
  .header { background:var(--navy); color:#fff; padding:16px 28px; display:flex; align-items:center; justify-content:space-between; }
  .header h1 { font-size:18px; font-weight:700; letter-spacing:.5px; }
  .header .sub { font-size:11px; opacity:.7; margin-top:2px; }
  .header-right { display:flex; gap:10px; align-items:center; }
  .btn { padding:7px 16px; border:none; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; }
  .btn-white { background:#fff; color:var(--navy); }
  .btn-blue  { background:var(--blue); color:#fff; }
  .pill { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  .pill-green  { background:var(--green-bg); color:var(--green); }
  .pill-amber  { background:var(--amber-bg); color:var(--amber); }
  .pill-red    { background:var(--red-bg);   color:var(--red);   }
  .pill-blue   { background:var(--light-blue); color:var(--blue); }

  /* ── LAYOUT ── */
  .main { padding:20px 28px; }

  /* ── KPI STRIP ── */
  .kpis { display:grid; grid-template-columns:repeat(6,1fr); gap:14px; margin-bottom:22px; }
  .kpi { background:#fff; border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
  .kpi .label { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; font-weight:600; }
  .kpi .value { font-size:22px; font-weight:800; color:var(--navy); margin:4px 0 2px; }
  .kpi .sub   { font-size:10px; color:var(--grey); }
  .kpi .val-green { color:var(--green); }
  .kpi .val-red   { color:var(--red);   }

  /* ── GRID ── */
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
  .row3 { display:grid; grid-template-columns:1.5fr 1fr; gap:20px; margin-bottom:20px; }
  .card { background:#fff; border:1px solid var(--border); border-radius:10px; padding:18px 20px; }
  .card h3 { font-size:13px; font-weight:700; color:var(--navy); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .card h3 .badge { background:var(--light-blue); color:var(--blue); font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; }

  /* ── UTILISATION BANDS ── */
  .util-bars { display:flex; flex-direction:column; gap:8px; }
  .util-band { display:grid; grid-template-columns:80px 1fr 50px; align-items:center; gap:10px; }
  .util-label { font-size:11px; font-weight:600; color:var(--text2); }
  .bar-track { height:22px; background:var(--bg); border-radius:4px; overflow:hidden; position:relative; }
  .bar-fill  { height:100%; border-radius:4px; transition:width .6s ease; display:flex; align-items:center; padding-left:8px; font-size:10px; font-weight:700; color:#fff; }
  .bar-target { background:var(--green);  }
  .bar-near   { background:#f59e0b; }
  .bar-under  { background:#60a5fa; }
  .bar-over   { background:var(--red);  }
  .bar-none   { background:var(--grey); }
  .bar-count  { font-size:11px; font-weight:700; color:var(--text); text-align:right; }

  /* ── TABLE ── */
  .tbl-wrap { overflow-x:auto; max-height:320px; overflow-y:auto; }
  table { width:100%; border-collapse:collapse; }
  th { position:sticky; top:0; background:var(--navy); color:#fff; padding:8px 10px; text-align:left; font-size:10px; font-weight:700; letter-spacing:.3px; white-space:nowrap; z-index:1; }
  td { padding:8px 10px; border-bottom:1px solid var(--border); font-size:11px; white-space:nowrap; }
  tr:hover td { background:var(--light-blue); }
  .td-right { text-align:right; }
  .td-center { text-align:center; }
  .outcome-won    { color:var(--green);  font-weight:700; }
  .outcome-lost   { color:var(--red);    font-weight:700; }
  .outcome-pending{ color:var(--amber);  font-weight:700; }

  /* ── DESTINATION HEAT ── */
  .dest-grid { display:flex; flex-wrap:wrap; gap:8px; }
  .dest-chip { display:flex; align-items:center; gap:6px; background:var(--light-blue); border:1px solid #bfdbfe; border-radius:20px; padding:5px 12px; }
  .dest-chip .city { font-size:11px; font-weight:700; color:var(--navy); }
  .dest-chip .cnt  { font-size:10px; color:var(--blue); font-weight:600; }
  .dest-chip .bar-inline { height:4px; background:var(--blue); border-radius:2px; min-width:4px; }

  /* ── OVER-BUDGET DETAIL ── */
  .over-item { display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); }
  .over-item:last-child { border-bottom:none; }
  .over-name { font-weight:600; font-size:12px; }
  .over-sub  { font-size:10px; color:var(--grey); }
  .over-pct  { font-size:13px; font-weight:800; color:var(--red); }
  .over-by   { font-size:10px; color:var(--red); text-align:right; }

  /* ── EMPTY STATE ── */
  .empty { text-align:center; padding:40px; color:var(--grey); font-size:12px; }

  /* ── LOADING ── */
  .loading { text-align:center; padding:60px; color:var(--grey); }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── FILTER BAR ── */
  .filters { display:flex; gap:10px; margin-bottom:18px; align-items:center; flex-wrap:wrap; }
  .filters select, .filters input { padding:7px 10px; border:1px solid var(--border); border-radius:6px; font-size:12px; background:#fff; color:var(--text); }
  .filter-label { font-size:11px; color:var(--text2); font-weight:600; }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="header">
  <div>
    <div class="header-right" style="justify-content:flex-start; margin-bottom:2px;">
      <span style="font-size:20px;">🧭</span>
      <h1>Quote Intelligence Dashboard</h1>
    </div>
    <div class="sub">TripStore Holidays · Internal Analytics · Live from Quote_Log</div>
  </div>
  <div class="header-right">
    <span id="lastRefresh" style="font-size:11px; opacity:.7;"></span>
    <button class="btn btn-white" onclick="loadData()">↻ Refresh</button>
    <button class="btn btn-blue" onclick="exportCSV()">↓ Export CSV</button>
  </div>
</div>

<div class="main" id="mainContent">
  <div class="loading">
    <div class="spinner"></div>
    Loading quote data from Google Sheets...
  </div>
</div>

<script>
// ── CONFIG ── Replace with your deployed Apps Script Web App URL
const API_URL = 'https://script.google.com/macros/s/AKfycby8KK3FPdT4vEzHhNpNUhx7wA8GeBvt5lE15OTffqaESGi5wY_Fr0sSVa3VcL3djPI9_Q/exec';

// ── Sample/demo data for standalone preview
// Remove this and use API_URL in production
const DEMO_DATA = [
  { quoteId:'Q-10001', paxName:'Sumit',         loggedAt:'2026-03-28', travelMonth:'April 2026', adults:2,  children:0, totalPax:2,  cities:'Amsterdam, Brussels, Paris',                    totalNights:3,  numCities:3, hotelNet:111363, sightNet:45539,  transferNet:10376, trainsNet:17600, subTotal:184878, markupPct:15, markupAmt:27732, gstAmt:1387, grandTotal:213997, budgetEntered:235000, utilPct:91.1, budgetFlag:'NEAR',      category:'Superior',  vehicle:'Economy',     outcome:'Pending' },
  { quoteId:'Q-10002', paxName:'Fatema',         loggedAt:'2026-03-28', travelMonth:'May 2026',   adults:2,  children:0, totalPax:2,  cities:'Athens, Santorini, Mykonos',                    totalNights:9,  numCities:3, hotelNet:105255, sightNet:61445,  transferNet:7515,  trainsNet:14850, subTotal:189065, markupPct:15, markupAmt:28360, gstAmt:1418, grandTotal:218843, budgetEntered:340000, utilPct:64.4, budgetFlag:'UNDER',     category:'Superior',  vehicle:'Economy',     outcome:'Won'    },
  { quoteId:'Q-10003', paxName:'Benson',         loggedAt:'2026-03-30', travelMonth:'June 2026',  adults:2,  children:0, totalPax:2,  cities:'Zurich, Milan',                                 totalNights:6,  numCities:2, hotelNet:107889, sightNet:13826,  transferNet:24114, trainsNet:13500, subTotal:159329, markupPct:15, markupAmt:23899, gstAmt:1195, grandTotal:184423, budgetEntered:0,      utilPct:'',   budgetFlag:'No Budget', category:'Luxury',    vehicle:'Premium Van', outcome:'Won'    },
  { quoteId:'Q-10004', paxName:'Sumit_Italy',    loggedAt:'2026-03-30', travelMonth:'April 2026', adults:2,  children:0, totalPax:2,  cities:'Rome, Florence, Milan',                         totalNights:10, numCities:3, hotelNet:202666, sightNet:71903,  transferNet:19952, trainsNet:17600, subTotal:312121, markupPct:15, markupAmt:46818, gstAmt:2341, grandTotal:361280, budgetEntered:0,      utilPct:'',   budgetFlag:'No Budget', category:'Luxury',    vehicle:'Economy',     outcome:'Pending' },
  { quoteId:'Q-10005', paxName:'Test Final',     loggedAt:'2026-03-30', travelMonth:'May 2026',   adults:2,  children:0, totalPax:2,  cities:'Prague, Budapest, Vienna',                      totalNights:8,  numCities:3, hotelNet:179627, sightNet:41589,  transferNet:10231, trainsNet:19200, subTotal:250647, markupPct:15, markupAmt:37597, gstAmt:1880, grandTotal:290124, budgetEntered:0,      utilPct:'',   budgetFlag:'No Budget', category:'Standard',  vehicle:'Economy',     outcome:'Pending' },
  { quoteId:'Q-10006', paxName:'Dimple',         loggedAt:'2026-03-31', travelMonth:'June 2026',  adults:9,  children:0, totalPax:9,  cities:'Munich, Innsbruck, Salzburg, Vienna, Dubrovnik', totalNights:13, numCities:5, hotelNet:214277, sightNet:3895,   transferNet:14900, trainsNet:16800, subTotal:249872, markupPct:15, markupAmt:37481, gstAmt:1874, grandTotal:289227, budgetEntered:50000,  utilPct:578.5,budgetFlag:'OVER',      category:'Standard',  vehicle:'Standard Van',outcome:'Pending' },
  { quoteId:'Q-10007', paxName:'Eastern Europe', loggedAt:'2026-04-01', travelMonth:'July 2026',  adults:2,  children:1, totalPax:3,  cities:'Prague, Krakow, Warsaw',                        totalNights:7,  numCities:3, hotelNet:145000, sightNet:38000,  transferNet:12000, trainsNet:15000, subTotal:210000, markupPct:15, markupAmt:31500, gstAmt:1575, grandTotal:243075, budgetEntered:260000, utilPct:93.5, budgetFlag:'NEAR',      category:'Standard',  vehicle:'Standard Van',outcome:'Won'    },
  { quoteId:'Q-10008', paxName:'Arun',           loggedAt:'2026-04-01', travelMonth:'August 2026',adults:4,  children:2, totalPax:6,  cities:'Barcelona, Madrid',                             totalNights:6,  numCities:2, hotelNet:185000, sightNet:55000,  transferNet:18000, trainsNet:22550, subTotal:280550, markupPct:15, markupAmt:42083, gstAmt:2104, grandTotal:324737, budgetEntered:330000, utilPct:98.4, budgetFlag:'✅ TARGET', category:'Superior',  vehicle:'Standard Van',outcome:'Won'    },
  { quoteId:'Q-10009', paxName:'Italy Test1',    loggedAt:'2026-04-02', travelMonth:'September 2026',adults:6,children:0,totalPax:6, cities:'Rome, Florence, Amalfi',                        totalNights:9,  numCities:3, hotelNet:320000, sightNet:88000,  transferNet:28000, trainsNet:20000, subTotal:456000, markupPct:15, markupAmt:68400, gstAmt:3420, grandTotal:527820, budgetEntered:510000, utilPct:103.5,budgetFlag:'OVER',      category:'Luxury',    vehicle:'Premium Van', outcome:'Pending' },
  { quoteId:'Q-10010', paxName:'Aanchal',        loggedAt:'2026-04-02', travelMonth:'October 2026',adults:2, children:0, totalPax:2,  cities:'Paris, Nice, Monaco',                           totalNights:7,  numCities:3, hotelNet:245000, sightNet:62000,  transferNet:21000, trainsNet:18000, subTotal:346000, markupPct:15, markupAmt:51900, gstAmt:2595, grandTotal:400495, budgetEntered:410000, utilPct:97.7, budgetFlag:'✅ TARGET', category:'Luxury',    vehicle:'Economy',     outcome:'Won'    },
  { quoteId:'Q-10011', paxName:'test22',         loggedAt:'2026-04-01', travelMonth:'May 2026',   adults:2,  children:0, totalPax:2,  cities:'Amsterdam, Brussels',                           totalNights:5,  numCities:2, hotelNet:98000,  sightNet:28000,  transferNet:9000,  trainsNet:6300,  subTotal:141300, markupPct:15, markupAmt:21195, gstAmt:1060, grandTotal:163555, budgetEntered:170000, utilPct:96.2, budgetFlag:'✅ TARGET', category:'Standard',  vehicle:'Economy',     outcome:'Pending' },
];

let allData = [];
let filtered = [];

async function loadData() {
  try {
    const res = await fetch(API_URL + '?action=getQuoteLog');
    const live = await res.json();
    // Fall back to demo data if Quote_Log is empty (not yet set up)
    allData = (Array.isArray(live) && live.length > 0) ? live : DEMO_DATA;
    filtered = [...allData];
    document.getElementById('lastRefresh').textContent = 'Last refresh: ' + new Date().toLocaleTimeString();
    render();
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      '<div class="loading" style="color:#dc2626">⚠️ Could not load data. Check API_URL configuration.<br><small>' + e.message + '</small></div>';
  }
}

function applyFilters() {
  const outcome = document.getElementById('fOutcome').value;
  const month   = document.getElementById('fMonth').value;
  const budget  = document.getElementById('fBudget').value;

  filtered = allData.filter(r => {
    if (outcome && r.outcome !== outcome) return false;
    if (month   && r.travelMonth !== month) return false;
    if (budget  && r.budgetFlag !== budget) return false;
    return true;
  });
  render(true); // re-render tables/charts only
}

function render(filtersOnly = false) {
  const Q = filtered;
  if (!Q.length) { document.getElementById('mainContent').innerHTML = '<div class="empty">No quotes match the current filters.</div>'; return; }

  // ── KPIs ──
  const total       = Q.length;
  const withBudget  = Q.filter(q => q.budgetEntered > 0);
  const targetZone  = Q.filter(q => q.budgetFlag === '✅ TARGET').length;
  const overBudget  = Q.filter(q => q.budgetFlag === 'OVER').length;
  const won         = Q.filter(q => q.outcome === 'Won').length;
  const avgUtil     = withBudget.length
    ? (withBudget.reduce((s,q) => s + (parseFloat(q.utilPct)||0), 0) / withBudget.length).toFixed(1)
    : 'N/A';
  const totalGMV    = Q.reduce((s,q) => s + (q.grandTotal||0), 0);
  const avgMarkup   = (Q.reduce((s,q) => s + (q.markupPct||0),0)/Q.length).toFixed(1);

  // ── UTILISATION BANDS ──
  const bands = {
    '✅ TARGET (95–99%)': Q.filter(q=>q.budgetFlag==='✅ TARGET').length,
    'NEAR (90–94%)':      Q.filter(q=>q.budgetFlag==='NEAR').length,
    'UNDER (<90%)':       Q.filter(q=>q.budgetFlag==='UNDER').length,
    'OVER (>100%)':       Q.filter(q=>q.budgetFlag==='OVER').length,
    'No Budget Set':      Q.filter(q=>q.budgetFlag==='No Budget').length,
  };
  const bandMax = Math.max(...Object.values(bands), 1);
  const bandClass = {'✅ TARGET (95–99%)':'bar-target','NEAR (90–94%)':'bar-near','UNDER (<90%)':'bar-under','OVER (>100%)':'bar-over','No Budget Set':'bar-none'};

  // ── DESTINATION FREQUENCY ──
  const cityFreq = {};
  Q.forEach(q => (q.cities||'').split(',').map(c=>c.trim()).filter(Boolean).forEach(c => cityFreq[c]=(cityFreq[c]||0)+1));
  const topCities = Object.entries(cityFreq).sort((a,b)=>b[1]-a[1]).slice(0,16);
  const maxCityFreq = topCities[0]?.[1] || 1;

  // ── OVER-BUDGET QUOTES ──
  const overQ = Q.filter(q=>q.budgetFlag==='OVER').sort((a,b)=>(b.utilPct||0)-(a.utilPct||0));

  // ── MONTHS ──
  const months = [...new Set(allData.map(q=>q.travelMonth).filter(Boolean))].sort();

  // ── BUILD HTML ──
  const html = `
  <!-- FILTERS -->
  <div class="filters">
    <span class="filter-label">FILTER:</span>
    <select id="fOutcome" onchange="applyFilters()">
      <option value="">All Outcomes</option>
      <option value="Won">Won</option>
      <option value="Lost">Lost</option>
      <option value="Pending">Pending</option>
    </select>
    <select id="fMonth" onchange="applyFilters()">
      <option value="">All Months</option>
      ${months.map(m=>`<option value="${m}">${m}</option>`).join('')}
    </select>
    <select id="fBudget" onchange="applyFilters()">
      <option value="">All Budget Flags</option>
      <option value="✅ TARGET">✅ Target (95–99%)</option>
      <option value="NEAR">Near (90–94%)</option>
      <option value="UNDER">Under (&lt;90%)</option>
      <option value="OVER">Over Budget</option>
    </select>
    <span style="margin-left:auto; font-size:11px; color:var(--grey);">Showing ${Q.length} of ${allData.length} quotes</span>
  </div>

  <!-- KPI STRIP -->
  <div class="kpis">
    <div class="kpi">
      <div class="label">Total Quotes</div>
      <div class="value">${total}</div>
      <div class="sub">All saved itineraries</div>
    </div>
    <div class="kpi">
      <div class="label">In Target Zone</div>
      <div class="value val-green">${targetZone}</div>
      <div class="sub">95–99% utilisation</div>
    </div>
    <div class="kpi">
      <div class="label">Over Budget</div>
      <div class="value ${overBudget>0?'val-red':''}">${overBudget}</div>
      <div class="sub">Exceeded client budget</div>
    </div>
    <div class="kpi">
      <div class="label">Avg Utilisation</div>
      <div class="value">${avgUtil}${avgUtil!=='N/A'?'%':''}</div>
      <div class="sub">Of quotes with budget</div>
    </div>
    <div class="kpi">
      <div class="label">Won</div>
      <div class="value val-green">${won}</div>
      <div class="sub">${total>0?(won/total*100).toFixed(0):0}% conversion</div>
    </div>
    <div class="kpi">
      <div class="label">Total GMV</div>
      <div class="value" style="font-size:16px;">₹${(totalGMV/100000).toFixed(1)}L</div>
      <div class="sub">Avg markup ${avgMarkup}%</div>
    </div>
  </div>

  <!-- ROW 2 -->
  <div class="row2">
    <!-- UTILISATION BANDS -->
    <div class="card">
      <h3>Budget Utilisation Distribution <span class="badge">${withBudget.length} quotes with budget</span></h3>
      <div class="util-bars">
        ${Object.entries(bands).map(([label, count]) => `
          <div class="util-band">
            <div class="util-label">${label.split('(')[0].trim()}</div>
            <div class="bar-track">
              <div class="bar-fill ${bandClass[label]}" style="width:${Math.max(count/bandMax*100,count>0?8:0)}%">
                ${count>0?label.split('(')[1]?.replace(')','')?.trim()||'':''}
              </div>
            </div>
            <div class="bar-count">${count}</div>
          </div>
        `).join('')}
      </div>
      <div style="margin-top:16px; padding:10px; background:var(--green-light); border-radius:6px; font-size:11px; color:var(--green);">
        <strong>Target:</strong> 70%+ of quoted packages should land in the 95–99% zone.
        Below 90% = sightseeing inventory gap. Above 100% = agent override or stale pricing.
      </div>
    </div>

    <!-- OVER-BUDGET DETAIL -->
    <div class="card">
      <h3>Over-Budget Quotes <span class="badge" style="background:var(--red-bg);color:var(--red);">${overBudget} flagged</span></h3>
      ${overQ.length === 0 ? '<div class="empty">✅ No over-budget quotes in this view.</div>' :
        overQ.map(q => `
          <div class="over-item">
            <div>
              <div class="over-name">${q.paxName}</div>
              <div class="over-sub">${q.cities} · ${q.travelMonth}</div>
            </div>
            <div>
              <div class="over-pct">${q.utilPct}%</div>
              <div class="over-by">₹${fmt(q.grandTotal - q.budgetEntered)} over</div>
            </div>
            <span class="pill ${q.outcome==='Won'?'pill-green':q.outcome==='Lost'?'pill-red':'pill-amber'}">${q.outcome}</span>
          </div>
        `).join('')
      }
      <div style="margin-top:12px; padding:10px; background:var(--red-bg); border-radius:6px; font-size:11px; color:var(--red);">
        <strong>Check:</strong> Is this a hotel tier selection issue, sightseeing overflow, or stale pricing in the master?
      </div>
    </div>
  </div>

  <!-- ROW 3 -->
  <div class="row3">
    <!-- QUOTE LOG TABLE -->
    <div class="card">
      <h3>Quote Log <span class="badge">${Q.length} entries</span></h3>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>Pax Name</th>
              <th>Cities</th>
              <th class="td-right">Nts</th>
              <th class="td-right">PAX</th>
              <th class="td-right">Grand Total</th>
              <th class="td-right">Util %</th>
              <th class="td-center">Flag</th>
              <th class="td-center">Outcome</th>
            </tr>
          </thead>
          <tbody>
            ${Q.slice().sort((a,b)=>new Date(b.loggedAt)-new Date(a.loggedAt)).map(q => `
              <tr>
                <td><strong>${q.paxName}</strong><br><span style="font-size:9px;color:var(--grey)">${q.travelMonth}</span></td>
                <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;">${q.cities}</td>
                <td class="td-right">${q.totalNights}</td>
                <td class="td-right">${q.totalPax}</td>
                <td class="td-right" style="font-weight:700;">₹${fmt(q.grandTotal)}</td>
                <td class="td-right" style="font-weight:700;${q.budgetFlag==='OVER'?'color:var(--red)':q.budgetFlag==='✅ TARGET'?'color:var(--green)':''}">${q.utilPct||'—'}${q.utilPct?'%':''}</td>
                <td class="td-center">
                  ${q.budgetFlag==='✅ TARGET'?'<span class="pill pill-green">✅</span>':
                    q.budgetFlag==='OVER'?'<span class="pill pill-red">OVER</span>':
                    q.budgetFlag==='NEAR'?'<span class="pill pill-amber">NEAR</span>':
                    q.budgetFlag==='UNDER'?'<span class="pill pill-blue">UNDER</span>':
                    '<span style="font-size:9px;color:var(--grey)">—</span>'}
                </td>
                <td class="td-center outcome-${q.outcome?.toLowerCase()||'pending'}">${q.outcome||'Pending'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <!-- DESTINATION HEATMAP -->
    <div class="card">
      <h3>Most Quoted Destinations</h3>
      <div class="dest-grid">
        ${topCities.map(([city, cnt]) => `
          <div class="dest-chip">
            <div>
              <div class="city">${city}</div>
            </div>
            <div class="bar-inline" style="width:${Math.max(cnt/maxCityFreq*36,4)}px"></div>
            <div class="cnt">${cnt}×</div>
          </div>
        `).join('')}
      </div>
      <div style="margin-top:16px;">
        <canvas id="chartDestinations" height="160"></canvas>
      </div>
    </div>
  </div>

  <!-- BREAKDOWN CHARTS ROW -->
  <div class="row2">
    <div class="card">
      <h3>Revenue Composition (Avg per Quote)</h3>
      <canvas id="chartComposition" height="200"></canvas>
    </div>
    <div class="card">
      <h3>Quote Volume by Travel Month</h3>
      <canvas id="chartMonths" height="200"></canvas>
    </div>
  </div>
  `;

  document.getElementById('mainContent').innerHTML = html;

  // Restore filter state
  if (filtersOnly) {
    // filters already rendered, re-apply values if needed
  }

  // ── CHARTS ──
  renderCharts(Q, topCities);
}

function renderCharts(Q, topCities) {
  // Composition donut
  const avgH = avg(Q,'hotelNet'), avgS = avg(Q,'sightNet'), avgT = avg(Q,'transferNet'), avgI = avg(Q,'trainsNet');
  new Chart(document.getElementById('chartComposition'), {
    type:'doughnut',
    data:{
      labels:['Hotels','Sightseeing','Transfers','Trains'],
      datasets:[{
        data:[avgH,avgS,avgT,avgI],
        backgroundColor:['#1a3c5e','#2563eb','#f59e0b','#16a34a'],
        borderWidth:2
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{
        legend:{position:'right',labels:{font:{size:11}}},
        tooltip:{callbacks:{label:ctx=>`₹${fmt(ctx.raw)} avg (${(ctx.raw/(avgH+avgS+avgT+avgI)*100).toFixed(0)}%)`}}
      }
    }
  });

  // Monthly volume bar
  const monthCounts = {};
  Q.forEach(q => { if(q.travelMonth) monthCounts[q.travelMonth] = (monthCounts[q.travelMonth]||0)+1; });
  const mLabels = Object.keys(monthCounts).sort();
  new Chart(document.getElementById('chartMonths'), {
    type:'bar',
    data:{
      labels:mLabels,
      datasets:[{
        label:'Quotes',
        data:mLabels.map(m=>monthCounts[m]),
        backgroundColor:'#2563eb',
        borderRadius:4
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:1}},x:{ticks:{font:{size:10}}}}
    }
  });
}

function avg(arr, key) {
  if (!arr.length) return 0;
  return Math.round(arr.reduce((s,q)=>s+(q[key]||0),0)/arr.length);
}

function fmt(n) {
  if (!n && n !== 0) return '—';
  return Math.round(n).toLocaleString('en-IN');
}

function exportCSV() {
  const keys = Object.keys(filtered[0]||{});
  const rows = [keys.join(','), ...filtered.map(r => keys.map(k => `"${r[k]||''}"`).join(','))];
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tripstore_quote_log_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// Load on page open
loadData();
</script>
</body>
</html>
