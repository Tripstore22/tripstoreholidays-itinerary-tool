<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --navy:#1a3c5e; --blue:#2563eb; --light-blue:#eff6ff;
    --green:#16a34a; --green-bg:#d4edda; --green-light:#f0fdf4;
    --amber:#d97706; --amber-bg:#fff3cd;
    --red:#dc2626;   --red-bg:#f8d7da;
    --grey:#64748b;  --border:#e2e8f0; --bg:#f8fafc;
    --text:#1e293b;  --text2:#475569;
    --purple:#7c3aed; --purple-bg:#ede9fe;
    --teal:#0d9488;  --teal-bg:#ccfbf1;
  }
  body { font-family:Arial,sans-serif; background:var(--bg); color:var(--text); font-size:13px; }

  /* HEADER */
  .header { background:var(--navy); color:#fff; padding:16px 28px; display:flex; align-items:center; justify-content:space-between; }
  .header h1 { font-size:18px; font-weight:700; letter-spacing:.5px; }
  .header .sub { font-size:11px; opacity:.7; margin-top:2px; }
  .header-right { display:flex; gap:10px; align-items:center; }
  .btn { padding:7px 16px; border:none; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; }
  .btn-white { background:#fff; color:var(--navy); }
  .btn-blue  { background:var(--blue); color:#fff; }
  .pill { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  .pill-green  { background:var(--green-bg); color:var(--green); }
  .pill-amber  { background:var(--amber-bg); color:var(--amber); }
  .pill-red    { background:var(--red-bg);   color:var(--red);   }
  .pill-blue   { background:var(--light-blue); color:var(--blue); }

  /* LAYOUT */
  .main { padding:20px 28px; }

  /* SECTION HEADERS */
  .section-title { font-size:12px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:.8px; margin:24px 0 12px; padding-bottom:8px; border-bottom:2px solid var(--border); display:flex; align-items:center; gap:8px; }
  .section-title .dot { width:8px; height:8px; border-radius:50%; background:var(--blue); flex-shrink:0; }

  /* KPI STRIP — 4 across, 2 rows */
  .kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:8px; }
  .kpi { background:#fff; border:1px solid var(--border); border-radius:10px; padding:14px 16px; position:relative; overflow:hidden; }
  .kpi::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--blue); }
  .kpi.kpi-green::before  { background:var(--green); }
  .kpi.kpi-red::before    { background:var(--red); }
  .kpi.kpi-amber::before  { background:var(--amber); }
  .kpi.kpi-purple::before { background:var(--purple); }
  .kpi.kpi-teal::before   { background:var(--teal); }
  .kpi .label { font-size:10px; color:var(--text2); text-transform:uppercase; letter-spacing:.5px; font-weight:600; }
  .kpi .value { font-size:24px; font-weight:800; color:var(--navy); margin:4px 0 2px; line-height:1.1; }
  .kpi .sub   { font-size:10px; color:var(--grey); }
  .kpi .icon  { position:absolute; right:14px; top:14px; font-size:22px; opacity:.15; }
  .val-green { color:var(--green) !important; }
  .val-red   { color:var(--red)   !important; }
  .val-amber { color:var(--amber) !important; }
  .val-purple{ color:var(--purple)!important; }
  .val-teal  { color:var(--teal)  !important; }

  /* TREND BADGE */
  .trend { display:inline-flex; align-items:center; gap:3px; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; margin-left:6px; }
  .trend-up   { background:var(--green-bg); color:var(--green); }
  .trend-down { background:var(--red-bg);   color:var(--red);   }

  /* GRID */
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
  .row3 { display:grid; grid-template-columns:1.5fr 1fr; gap:20px; margin-bottom:20px; }
  .row-full { margin-bottom:20px; }
  .card { background:#fff; border:1px solid var(--border); border-radius:10px; padding:18px 20px; }
  .card h3 { font-size:13px; font-weight:700; color:var(--navy); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .card h3 .badge { background:var(--light-blue); color:var(--blue); font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600; }

  /* TOP 5 DESTINATION CARDS */
  .dest-spotlight { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:20px; }
  .dest-card { background:#fff; border:1px solid var(--border); border-radius:10px; padding:14px 12px; text-align:center; position:relative; overflow:hidden; }
  .dest-card .rank { font-size:10px; font-weight:800; color:var(--blue); text-transform:uppercase; letter-spacing:.5px; }
  .dest-card .city-name { font-size:15px; font-weight:800; color:var(--navy); margin:4px 0; }
  .dest-card .city-cnt { font-size:22px; font-weight:900; color:var(--blue); line-height:1; }
  .dest-card .city-label { font-size:9px; color:var(--grey); text-transform:uppercase; letter-spacing:.5px; }
  .dest-card .city-nights { font-size:11px; color:var(--text2); margin-top:6px; }
  .dest-card:first-child { border-color:#2563eb; box-shadow:0 0 0 1px #2563eb20; }
  .dest-card:first-child .city-cnt { color:var(--navy); }
  .dest-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--blue),var(--navy)); opacity:.15; }
  .dest-card:first-child::after { opacity:1; }

  /* CITY PERFORMANCE TABLES */
  .city-tables { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .rank-badge { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:50%; font-size:10px; font-weight:800; }
  .rank-top    { background:#fef3c7; color:#92400e; }
  .rank-bottom { background:#fee2e2; color:#991b1b; }
  .rank-1 { background:var(--navy); color:#fff; }

  /* TABLE */
  .tbl-wrap { overflow-x:auto; max-height:340px; overflow-y:auto; }
  table { width:100%; border-collapse:collapse; }
  th { position:sticky; top:0; background:var(--navy); color:#fff; padding:8px 10px; text-align:left; font-size:10px; font-weight:700; letter-spacing:.3px; white-space:nowrap; z-index:1; }
  td { padding:8px 10px; border-bottom:1px solid var(--border); font-size:11px; white-space:nowrap; }
  tr:hover td { background:var(--light-blue); }
  .td-right  { text-align:right; }
  .td-center { text-align:center; }
  .outcome-won    { color:var(--green); font-weight:700; }
  .outcome-lost   { color:var(--red);   font-weight:700; }
  .outcome-pending{ color:var(--amber); font-weight:700; }

  /* UTILISATION BANDS */
  .util-bars { display:flex; flex-direction:column; gap:8px; }
  .util-band { display:grid; grid-template-columns:100px 1fr 50px; align-items:center; gap:10px; }
  .util-label { font-size:11px; font-weight:600; color:var(--text2); }
  .bar-track { height:22px; background:var(--bg); border-radius:4px; overflow:hidden; position:relative; }
  .bar-fill  { height:100%; border-radius:4px; transition:width .6s ease; display:flex; align-items:center; padding-left:8px; font-size:10px; font-weight:700; color:#fff; }
  .bar-target { background:var(--green); }
  .bar-near   { background:#f59e0b; }
  .bar-under  { background:#60a5fa; }
  .bar-over   { background:var(--red); }
  .bar-none   { background:var(--grey); }
  .bar-count  { font-size:11px; font-weight:700; color:var(--text); text-align:right; }

  /* OVER-BUDGET DETAIL */
  .over-item { display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); }
  .over-item:last-child { border-bottom:none; }
  .over-name { font-weight:600; font-size:12px; }
  .over-sub  { font-size:10px; color:var(--grey); }
  .over-pct  { font-size:13px; font-weight:800; color:var(--red); }
  .over-by   { font-size:10px; color:var(--red); text-align:right; }

  /* ACTIVE USERS */
  .user-row { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid var(--border); }
  .user-row:last-child { border-bottom:none; }
  .user-avatar { width:32px; height:32px; border-radius:50%; background:var(--navy); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; flex-shrink:0; }
  .user-name { font-weight:700; font-size:12px; }
  .user-agency { font-size:10px; color:var(--grey); }
  .user-time { font-size:10px; color:var(--green); font-weight:600; margin-left:auto; white-space:nowrap; }
  .user-role { font-size:9px; text-transform:uppercase; font-weight:700; padding:2px 6px; border-radius:4px; }
  .role-admin { background:var(--navy); color:#fff; }
  .role-user  { background:var(--light-blue); color:var(--blue); }
  .online-dot { width:8px; height:8px; border-radius:50%; background:var(--green); flex-shrink:0; box-shadow:0 0 0 2px var(--green-bg); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 2px var(--green-bg)} 50%{box-shadow:0 0 0 4px var(--green-bg)} }

  /* MISC */
  .info-box { margin-top:12px; padding:10px; border-radius:6px; font-size:11px; }
  .info-green { background:var(--green-light); color:var(--green); }
  .info-red   { background:var(--red-bg);   color:var(--red);   }
  .info-blue  { background:var(--light-blue); color:var(--blue); }
  .info-amber { background:var(--amber-bg); color:var(--amber); }
  .empty { text-align:center; padding:32px; color:var(--grey); font-size:12px; }
  .loading { text-align:center; padding:60px; color:var(--grey); }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .filters { display:flex; gap:10px; margin-bottom:18px; align-items:center; flex-wrap:wrap; }
  .filters select, .filters input { padding:7px 10px; border:1px solid var(--border); border-radius:6px; font-size:12px; background:#fff; color:var(--text); }
  .filter-label { font-size:11px; color:var(--text2); font-weight:600; }

  /* METRIC MINI CHIPS */
  .metric-chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .metric-chip { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:8px 12px; min-width:100px; }
  .metric-chip .mc-label { font-size:9px; color:var(--grey); text-transform:uppercase; letter-spacing:.4px; font-weight:600; }
  .metric-chip .mc-value { font-size:15px; font-weight:800; color:var(--navy); }

  /* CATEGORY MIX BARS */
  .cat-bar-row { display:flex; align-items:center; gap:10px; padding:5px 0; }
  .cat-bar-label { font-size:11px; font-weight:600; color:var(--text2); width:80px; flex-shrink:0; }
  .cat-bar-track { flex:1; height:18px; background:var(--bg); border-radius:4px; overflow:hidden; }
  .cat-bar-fill { height:100%; border-radius:4px; display:flex; align-items:center; padding-left:6px; font-size:9px; font-weight:700; color:#fff; }
  .cat-lux  { background:var(--navy); }
  .cat-sup  { background:var(--blue); }
  .cat-std  { background:#93c5fd; }
  .cat-bar-pct { font-size:11px; font-weight:700; color:var(--text); width:36px; text-align:right; flex-shrink:0; }
</style>
</head>

async function loadAll() {
  try {
    // Fetch all 3 data sources in parallel
    const [quotesRes, cityRes, usersRes] = await Promise.allSettled([
      fetch(API_URL + '?action=getQuoteLog').then(r => r.json()),
      fetch(API_URL + '?action=getCityStats').then(r => r.json()),
      fetch(API_URL + '?action=getActiveUsers').then(r => r.json()),
    ]);

    allData     = (quotesRes.status==='fulfilled' && Array.isArray(quotesRes.value) && quotesRes.value.length>0) ? quotesRes.value : DEMO_QUOTES;
    cityStats   = (cityRes.status==='fulfilled'   && cityRes.value?.hotels)   ? cityRes.value   : DEMO_CITY_STATS;
    activeUsers = (usersRes.status==='fulfilled'  && usersRes.value?.count!=null) ? usersRes.value : DEMO_ACTIVE_USERS;

    filteredData = [...allData];
    document.getElementById('lastRefresh').textContent = 'Updated ' + new Date().toLocaleTimeString();
    document.getElementById('activeUsersHeader').textContent =
      activeUsers.count > 0
        ? '🟢 ' + activeUsers.count + ' user' + (activeUsers.count>1?'s':'') + ' online'
        : '⚪ No users active';
    render();
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      '<div class="loading" style="color:#dc2626">⚠️ Could not load data. Check API_URL.<br><small>' + e.message + '</small></div>';
  }
}

function applyFilters() {
  const outcome = document.getElementById('fOutcome').value;
  const month   = document.getElementById('fMonth').value;
  const budget  = document.getElementById('fBudget').value;
  filteredData = allData.filter(r => {
    if (outcome && r.outcome !== outcome) return false;
    if (month   && r.travelMonth !== month) return false;
    if (budget  && r.budgetFlag !== budget) return false;
    return true;
  });
  render(true);
}

  const avgNights   = Q.length ? (Q.reduce((s,q) => s + (q.totalNights||0), 0) / Q.length).toFixed(1) : 0;

          <tbody>
            ${Q.slice().sort((a,b)=>new Date(b.loggedAt)-new Date(a.loggedAt)).map(q => `
              <tr>
                <td><strong>${q.paxName}</strong><br><span style="font-size:9px;color:var(--grey)">${q.loggedAt}</span></td>
                <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;">${q.cities}</td>
                <td class="td-right">${q.totalNights}</td>
                <td class="td-right">${q.totalPax}</td>
                <td>${q.travelMonth||'—'}</td>
                <td class="td-right" style="font-weight:700;">₹${fmt(q.grandTotal)}</td>
                <td class="td-right" style="font-weight:700;${q.budgetFlag==='OVER'?'color:var(--red)':q.budgetFlag==='✅ TARGET'?'color:var(--green)':''}">${q.utilPct||'—'}${q.utilPct?'%':''}</td>
                <td class="td-center">
                  ${q.budgetFlag==='✅ TARGET'?'<span class="pill pill-green">✅</span>':
                    q.budgetFlag==='OVER'?'<span class="pill pill-red">OVER</span>':
                    q.budgetFlag==='NEAR'?'<span class="pill pill-amber">NEAR</span>':
                    q.budgetFlag==='UNDER'?'<span class="pill pill-blue">UNDER</span>':
                    '<span style="font-size:9px;color:var(--grey)">—</span>'}
                </td>
                <td class="td-center" style="font-size:10px;">${q.category||'—'}</td>
                <td class="td-center outcome-${(q.outcome||'pending').toLowerCase()}">${q.outcome||'Pending'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>
  `;

  document.getElementById('mainContent').innerHTML = html;
  renderCharts(Q);
}

function renderCharts(Q) {
  // Revenue composition donut
  const avgH = avg(Q,'hotelNet'), avgS = avg(Q,'sightNet'), avgT = avg(Q,'transferNet'), avgI = avg(Q,'trainsNet');
  new Chart(document.getElementById('chartComposition'), {
    type:'doughnut',
    data:{
      labels:['Hotels','Sightseeing','Transfers','Trains/Bus'],
      datasets:[{ data:[avgH,avgS,avgT,avgI], backgroundColor:['#1a3c5e','#2563eb','#f59e0b','#16a34a'], borderWidth:2 }]
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{
        legend:{position:'right',labels:{font:{size:11}}},
        tooltip:{callbacks:{label:ctx=>`₹${fmt(ctx.raw)} avg (${(ctx.raw/(avgH+avgS+avgT+avgI)*100).toFixed(0)}%)`}}
      }
    }
  });

  // Monthly volume
  const monthCounts = {};
  Q.forEach(q => { if(q.travelMonth) monthCounts[q.travelMonth] = (monthCounts[q.travelMonth]||0)+1; });
  const mLabels = Object.keys(monthCounts).sort();
  new Chart(document.getElementById('chartMonths'), {
    type:'bar',
    data:{
      labels:mLabels,
      datasets:[{ label:'Quotes', data:mLabels.map(m=>monthCounts[m]), backgroundColor:'#2563eb', borderRadius:4 }]
    },
    options:{
      responsive:true, maintainAspectRatio:true,
      plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,ticks:{stepSize:1}},x:{ticks:{font:{size:10}}}}
    }
  });
}

function timeAgo(isoStr) {
  if (!isoStr) return '—';
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff/60000);
  if (mins < 1)  return 'Just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins/60);
  if (hrs < 24)  return hrs + 'h ago';
  return Math.floor(hrs/24) + 'd ago';
}

function avg(arr, key) {
  if (!arr.length) return 0;
  return Math.round(arr.reduce((s,q)=>s+(q[key]||0),0)/arr.length);
}

function fmt(n) {
  if (!n && n !== 0) return '—';
  return Math.round(n).toLocaleString('en-IN');
}

function exportCSV() {
  if (!filteredData.length) return;
  const keys = Object.keys(filteredData[0]);
  const rows = [keys.join(','), ...filteredData.map(r => keys.map(k => `"${r[k]||''}"`).join(','))];
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'tripstore_admin_dashboard_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

// Load on open
loadAll();
